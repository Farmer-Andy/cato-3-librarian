name = "cato-3-librarian"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "CATO_AGENT", class_name = "CatoAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CatoAgent"]

# Secrets managed via Cloudflare dashboard or `wrangler secret put`:
# OPENROUTER_API_KEY  ✅
# TELEGRAM_BOT_TOKEN  ⏳
# ADMIN_TELEGRAM_ID   ✅
