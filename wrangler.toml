name = "cato-3-librarian"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[durable_objects]
bindings = [
  { name = "CATO_AGENT", class_name = "CatoAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CatoAgent"]

# Secrets (set each with `wrangler secret put <NAME>`, or in the Cloudflare dashboard):
#   OPENROUTER_API_KEY   OpenRouter API key
#   TELEGRAM_BOT_TOKEN   Telegram bot token from @BotFather
#   ADMIN_TELEGRAM_ID    your numeric Telegram user ID
#   ADMIN_TOKEN          shared secret for the HTTP admin API (fail-closed if unset)
